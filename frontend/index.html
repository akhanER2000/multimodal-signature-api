<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Firma Digital Multimodal</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        canvas { border: 1px solid #ccc; border-radius: 4px; cursor: crosshair; }
        .btn { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #0056b3; }
        .tabs { margin-bottom: 20px; }
        .tab { display: inline-block; padding: 10px; cursor: pointer; background: #e9ecef; border-radius: 4px; }
        .tab.active { background: #007bff; color: white; }
        .panel { display: none; margin-top: 15px; }
        .panel.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Gestión de Firmas B.L.A.S.T.</h2>
        
        <label><b>1. Carga tu Documento (PDF o DOCX):</b></label><br><br>
        <input type="file" id="docUpload" accept=".pdf,.docx"><br><br>
        
        <label><b>2. Crea tu Firma:</b></label><br><br>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('draw')">Dibujar</div>
            <div class="tab" onclick="switchTab('text')">Texto (Generar)</div>
            <div class="tab" onclick="switchTab('upload')">Subir Imagen</div>
        </div>

        <div id="drawPanel" class="panel active">
            <canvas id="sigCanvas" width="400" height="200"></canvas><br>
            <button class="btn" style="background:#dc3545;" onclick="signaturePad.clear()">Limpiar Canvas</button>
        </div>

        <div id="textPanel" class="panel">
            <input type="text" id="textSig" placeholder="Escribe tu nombre..." style="padding:10px; width:80%; font-family: 'Brush Script MT', cursive; font-size: 24px;">
        </div>

        <div id="uploadPanel" class="panel">
            <input type="file" id="imgSigUpload" accept="image/png, image/jpeg">
        </div>

        <hr>
        <button class="btn" style="width: 100%; font-size: 18px;" onclick="processSignature()">Firmar Documento</button>
        <p id="status"></p>
    </div>

    <script>
        const canvas = document.getElementById('sigCanvas');
        const signaturePad = new SignaturePad(canvas);
        let currentTab = 'draw';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Panel').classList.add('active');
        }

        async function processSignature() {
            const docInput = document.getElementById('docUpload').files[0];
            if (!docInput) return alert("Sube un documento primero.");
            
            document.getElementById('status').innerText = "Procesando...";

            // Leer doc a Base64
            const docB64 = await toBase64(docInput);
            
            // Obtener Payload de Firma
            let sigPayload = "";
            if (currentTab === 'draw') {
                if(signaturePad.isEmpty()) return alert("Dibuja tu firma.");
                sigPayload = signaturePad.toDataURL("image/png");
            } else if (currentTab === 'text') {
                const text = document.getElementById('textSig').value;
                if(!text) return alert("Escribe tu nombre.");
                // Fake text to canvas conversion for simplicity in POC
                const tCanvas = document.createElement('canvas');
                tCanvas.width = 400; tCanvas.height = 100;
                const ctx = tCanvas.getContext('2d');
                ctx.font = "40px 'Brush Script MT', cursive";
                ctx.fillText(text, 10, 50);
                sigPayload = tCanvas.toDataURL("image/png");
            } else if (currentTab === 'upload') {
                const imgInput = document.getElementById('imgSigUpload').files[0];
                if(!imgInput) return alert("Sube una imagen.");
                sigPayload = await toBase64(imgInput);
            }

            const payload = {
                document: {
                    filename: docInput.name,
                    mime_type: docInput.type || "application/octet-stream",
                    content_base64: docB64.split(',')[1]
                },
                signature_data: {
                    type: currentTab,
                    payload: sigPayload,
                    position: { x: 100, y: 100, width: 150, height: 75 } // Coordenadas fijas POC
                }
            };

            const response = await fetch('/api/sign', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            if (result.status === "success") {
                document.getElementById('status').innerText = "¡Éxito! Descargando...";
                const link = document.createElement('a');
                link.href = "data:" + result.output_document.mime_type + ";base64," + result.output_document.content_base64;
                link.download = result.output_document.filename;
                link.click();
            } else {
                document.getElementById('status').innerText = "Error: " + result.detail;
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    </script>
</body>
</html>
